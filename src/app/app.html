<div class="container-fluid min-vh-100 bg-light">
  <div class="row">

    <aside class="col-lg-3 col-xl-2 bg-white border-end min-vh-100 p-3">
      <div class="d-flex align-items-center gap-2 mb-4">
        <div class="bg-primary text-white rounded-4 p-3">

        </div>
        <div>
          <h5 class="mb-0 fw-bold">AI Dev</h5>
          <small class="text-muted">Assistant</small>

      <div class="list-group list-group-flush">

           class="list-group-item list-group-item-action rounded-3 mb-2">

        <a routerLink="/history"
