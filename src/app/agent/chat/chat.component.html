<div class="card border-0 shadow-sm rounded-4">
  <div class="card-body p-4">

    <h4 class="fw-bold mb-1">
      <i class="bi bi-chat-dots text-primary me-2"></i>
      Chat Mode
    </h4>
    <p class="text-muted mb-4">Ask follow-up questions with memory.</p>

    <div class="bg-light rounded-4 p-3 mb-3" style="height: 520px; overflow-y: auto;">

      <div *ngFor="let msg of messages" class="mb-3 d-flex"
           [ngClass]="msg.role === 'user' ? 'justify-content-end' : 'justify-content-start'">

        <div class="p-3 rounded-4 shadow-sm"
             [ngClass]="msg.role === 'user'
                ? 'bg-primary text-white'
                : 'bg-white border text-dark'"
             style="max-width: 75%; white-space: pre-wrap;">

          {{ msg.content }}

        </div>
      </div>

      <div *ngIf="loading" class="text-muted">
        <span class="spinner-border spinner-border-sm me-2"></span>
        Assistant is typing...
      </div>

    </div>

    <div class="input-group">
      <input class="form-control rounded-start-4"
             [(ngModel)]="message"
             placeholder="Ask your question..."
             (keyup.enter)="send()">

      <button class="btn btn-primary px-4 rounded-end-4"
              (click)="send()"
              [disabled]="loading">
        Send
      </button>
    </div>

  </div>
</div>
